        // Brain world radius (Three.js units), FOV=50° → half-angle tan
        var BRAIN_WORLD_R = 75;
        var FOV_TAN = Math.tan(25 * Math.PI / 180);

        function brainScreenRadius() {
            var cz = 380;

        // --- Connectors (live, zoom-aware) ---
        var NS = 'http://www.w3.org/2000/svg';
        var _els = []; // cached SVG elements per button

        function buildConnectorElements() {
            var svg = document.getElementById('connectors-svg');
            while (svg.firstChild) svg.removeChild(svg.firstChild);
            _els = [];
            document.querySelectorAll('.service-btn').forEach(function() {
                var dotA = document.createElementNS(NS, 'circle');

                dotA.setAttribute('fill', 'white');
                dotA.setAttribute('fill-opacity', '0.5');

                var line = document.createElementNS(NS, 'line');
                line.setAttribute('stroke', 'white');

                var dotB = document.createElementNS(NS, 'circle');
                dotB.setAttribute('r', '3.5');
                dotB.setAttribute('fill', 'white');
                dotB.setAttribute('fill-opacity', '0.82');

                svg.appendChild(dotA);
                svg.appendChild(line);
                svg.appendChild(dotB);
                _els.push({ dotA: dotA, line: line, dotB: dotB });

        }

        function liveUpdateConnectors() {
            var cx = window.innerWidth  / 2;
            var cy = window.innerHeight / 2;
            var br = brainScreenRadius();
            var i  = 0;

            function place(btn, fromRight) {
                var el   = _els[i++];
                if (!el) return;
                var rect = btn.getBoundingClientRect();
                var bx   = fromRight ? rect.right + 5 : rect.left - 5;
                var by   = rect.top  + rect.height / 2;
                var dx   = cx - bx,  dy = cy - by;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var ex   = cx - (dx / dist) * br;
                var ey   = cy - (dy / dist) * br;

                el.dotA.setAttribute('cx', bx); el.dotA.setAttribute('cy', by);
                el.line.setAttribute('x1', bx); el.line.setAttribute('y1', by);
                el.line.setAttribute('x2', ex); el.line.setAttribute('y2', ey);
                el.dotB.setAttribute('cx', ex); el.dotB.setAttribute('cy', ey);
            }

            document.querySelectorAll('#service-buttons-left  .service-btn').forEach(function(b){ place(b, true);  });
            document.querySelectorAll('#service-buttons-right .service-btn').forEach(function(b){ place(b, false); });

            requestAnimationFrame(liveUpdateConnectors);
        }
